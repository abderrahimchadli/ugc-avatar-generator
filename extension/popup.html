<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      body {
        width: 340px;
        margin: 0;
        padding: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: #0b0d12;
        color: #fff;
      }
      .wrap { padding: 18px; }
      .top {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .logo {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 12px;
        background: linear-gradient(135deg, #0071e3, #10b981);
      }
      .kicker {
        color: #8da2bd;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0;
      }
      h1 { font-size: 18px; margin: 2px 0 0; letter-spacing: 0; }
      .card {
        border: 1px solid rgba(255,255,255,.09);
        border-radius: 8px;
        background: rgba(255,255,255,.055);
        padding: 14px;
        margin-bottom: 12px;
      }
      .title { font-size: 14px; font-weight: 850; margin-bottom: 5px; }
      p { color: rgba(255,255,255,.72); font-size: 12px; line-height: 1.45; margin: 0; }
      .actions { display: grid; gap: 8px; }
      button, a.button {
        width: 100%;
        height: 40px;
        border: 0;
        border-radius: 8px;
        font-weight: 850;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }
      .primary { background: #fff; color: #101218; }
      .secondary { background: rgba(255,255,255,.09); color: #fff; border: 1px solid rgba(255,255,255,.09); }
      .muted { color: rgba(255,255,255,.52); font-size: 11px; margin-top: 10px; }
      code { color: #93c5fd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="logo">UGC</div>
        <div>
          <div class="kicker">Avatar Studio</div>
          <h1>Flow Bridge</h1>
        </div>
      </div>
      <div class="card">
        <div class="title" id="session-title">Checking session...</div>
        <p id="session-body">Looking for an active avatar or product package.</p>
      </div>
      <div class="actions">
        <button class="primary" id="open-live-app">Open live app</button>
        <button class="secondary" id="open-session-app" hidden>Open session app</button>
      </div>
      <p class="muted">Use Prompt Builder in the live app, then generate in Google Flow or ChatGPT and save images back to the package.</p>
    </div>
    <script src="bridgeCore.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
